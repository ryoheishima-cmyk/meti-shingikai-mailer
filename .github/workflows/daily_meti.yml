name: METI Daily Mailer

on:
  schedule:
    - cron: '0 6 * * *'  # 日本時間15時（UTC 6時）
  workflow_dispatch:       # 手動実行も可能

jobs:
  send-mail:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore previous links cache
        uses: actions/cache@v4
        with:
          path: prev_links.json
          key: prev-links-${{ github.run_id }}
          restore-keys: |
            prev-links-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python fetch_meti.py

      - name: Save updated links cache
        uses: actions/cache/save@v4
        with:
          path: prev_links.json
          key: prev-links-${{ github.run_id }}
